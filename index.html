<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AI学習プリントジェネレーター Pro</title>
    <style>
        :root { --primary: #2c3e50; --ai-color: #8e44ad; }
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; color: var(--primary); }
        .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .panel { border: 1px solid #ddd; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .ai-panel { border-color: var(--ai-color); background: #fdfaff; }
        h2 { color: var(--ai-color); font-size: 1.2em; margin-top: 0; }
        .input-group { margin-bottom: 15px; }
        input, select, button { padding: 10px; border-radius: 5px; border: 1px solid #ccc; }
        button { cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-ai { background: var(--ai-color); color: white; border: none; width: 100%; }
        .btn-ai:hover { opacity: 0.8; }
        .btn-print { background: #27ae60; color: white; border: none; margin-top: 10px; }
        
        /* 印刷レイアウト */
        .test-paper { margin-top: 30px; border-top: 2px solid #333; padding-top: 20px; }
        .question { margin-bottom: 20px; padding: 15px; border-bottom: 1px solid #eee; page-break-inside: avoid; }
        .answer { display: none; color: #e74c3c; font-weight: bold; margin-top: 10px; }
        
        @media print {
            .no-print { display: none; }
            .answer { display: block !important; }
            .container { box-shadow: none; width: 100%; max-width: 100%; }
        }
        #loading { display: none; color: var(--ai-color); font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="no-print">
        <h1>🏫 AIテストメーカー</h1>
        
        <div class="panel">
            <label>Google Gemini APIキー:</label>
            <input type="password" id="apiKey" placeholder="AIを使うにはキーを入力してください" style="width: 300px;">
            <small><a href="https://aistudio.google.com/app/apikey" target="_blank">キーを取得(無料)</a></small>
        </div>

        <div class="panel ai-panel">
            <h2>✨ AIに問題を考えてもらう</h2>
            <div class="input-group">
                学年: <select id="grade">
                    <option value="小学1年">小学1年</option><option value="小学6年">小学6年</option>
                    <option value="中学3年">中学3年</option><option value="高校3年">高校3年</option>
                </select>
                教科: <select id="subject">
                    <option value="国語">国語</option><option value="数学">数学</option>
                    <option value="英語">英語</option><option value="社会">社会</option><option value="理科">理科</option>
                </select>
                数: <input type="number" id="qCount" value="3" style="width: 50px;">
            </div>
            <button class="btn-ai" onclick="generateWithAI()">AIで問題を生成してテストを作成</button>
            <div id="loading">AIが思考中... (5〜10秒ほどかかります)</div>
        </div>
        
        <button class="btn btn-print" onclick="window.print()">🖨️ プリント印刷（回答付き）</button>
    </div>

    <div id="test-display" class="test-paper">
        <p style="color: #999; text-align: center;">AIで生成した問題がここに表示されます。</p>
    </div>
</div>

<script>
    async function generateWithAI() {
        const key = document.getElementById('apiKey').value;
        if (!key) { alert("APIキーを入力してください"); return; }

        const grade = document.getElementById('grade').value;
        const subject = document.getElementById('subject').value;
        const count = document.getElementById('qCount').value;
        const loading = document.getElementById('loading');
        
        loading.style.display = 'block';

        // AIへの指示（プロンプト）
        const prompt = `${grade}の${subject}の問題を${count}問作成してください。
        条件：
        - 間違えやすいポイントや重要な語句を含める
        - 選択問題や記述問題を混ぜる
        - 以下のJSONフォーマットのみで出力してください（余計な説明は不要）
        [{"q": "問題文", "a": "答え", "type": "選択/記述", "options": ["選択肢1", "選択肢2"]}]`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });

            const data = await response.json();
            const aiText = data.candidates[0].content.parts[0].text;
            
            // JSON部分だけを抽出（AIが```json ... ```で囲む場合があるため）
            const jsonStr = aiText.match(/\[.*\]/s)[0];
            const questions = JSON.parse(jsonStr);

            renderTest(questions, grade, subject);
        } catch (e) {
            console.error(e);
            alert("AI生成に失敗しました。APIキーを確認するか、時間をおいて試してください。");
        } finally {
            loading.style.display = 'none';
        }
    }

    function renderTest(questions, grade, subject) {
        const display = document.getElementById('test-display');
        let html = `<h2>${grade} ${subject} 実力テスト</h2>`;
        
        questions.forEach((q, i) => {
            html += `
                <div class="question">
                    <strong>問 ${i + 1}. [${q.type}]</strong><br>
                    <p style="font-size: 1.2em;">${q.q}</p>
            `;
            if (q.options) {
                html += `<ul>${q.options.map(opt => `<li>${opt}</li>`).join('')}</ul>`;
            }
            html += `<div class="answer">【正解】 ${q.a}</div></div>`;
        });
        
        display.innerHTML = html;
    }
</script>

</body>
</html>
